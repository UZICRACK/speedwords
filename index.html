<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SpeedWords</title>

<meta name="monetag" content="0a94ab521b3983a04eb6032297b6e356">

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
}

#game{
background:rgba(0,0,0,0.45);
backdrop-filter:blur(14px);
padding:45px;
border-radius:20px;
text-align:center;
width:440px;
box-shadow:0 0 50px rgba(0,0,0,0.5);
animation:fadeIn 1s;
z-index:2;
}

h1{margin-top:0;}

#timer{
font-size:64px;
font-weight:bold;
margin:10px 0 25px 0;
background:linear-gradient(90deg,#00e0ff,#00ffa6);
-webkit-background-clip:text;
color:transparent;
animation:pulse 1s infinite alternate;
}

@keyframes pulse{
from{transform:scale(1)}
to{transform:scale(1.08)}
}

#word{
font-size:40px;
letter-spacing:4px;
font-weight:bold;
margin:25px 0;
min-height:50px;
opacity:0;
transform:translateY(20px);
transition:.4s;
}

#word.show{
opacity:1;
transform:translateY(0);
}

.letter{transition:.25s;}

.correct{
color:#4cff9b;
transform:translateY(-4px);
}

.wrong{
color:#ff4c4c;
}

input{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
outline:none;
text-align:center;
}

button{
margin-top:25px;
padding:13px 28px;
border:none;
border-radius:12px;
font-size:17px;
background:linear-gradient(90deg,#00c3ff,#00ffa6);
color:white;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 15px #00ffa6;
}

#message{
margin-top:25px;
font-size:26px;
font-weight:bold;
}

#scoreFinal{
font-size:30px;
margin-top:10px;
opacity:0;
transform:translateY(20px);
transition:.4s;
}

#scoreFinal.show{
opacity:1;
transform:translateY(0);
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(.9)}
to{opacity:1;transform:scale(1)}
}

</style>
</head>

<body>

<canvas id="confetti"></canvas>
<audio id="correctSound" src="correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="wrong.mp3" preload="auto"></audio>
<audio id="victorySound" src="victory.mp3" preload="auto"></audio>
<audio id="timerSound" src="timer.mp3" preload="auto" loop></audio>

<div id="game">

<h1>⚡ SpeedWords</h1>

<div id="timer">30</div>

<div id="word"></div>

<input id="input" placeholder="Escribe aquí..." disabled>

<button id="startBtn">Iniciar</button>

<div id="message"></div>
<div id="scoreFinal"></div>

</div>

/* -------- VARIABLES -------- */

let currentWord="";
let score=0;
let time=30;
let timer;

const wordDiv=document.getElementById("word");
const input=document.getElementById("input");
const timerDiv=document.getElementById("timer");
const message=document.getElementById("message");
const scoreFinal=document.getElementById("scoreFinal");
const startBtn=document.getElementById("startBtn");

/* -------- FUNCIONES -------- */

function randomWord(){
return words[Math.floor(Math.random()*words.length)];
}

function displayWord(word){

wordDiv.innerHTML="";

for(let letter of word){

let span=document.createElement("span");
span.textContent=letter;
span.classList.add("letter");

wordDiv.appendChild(span);

}

}

function nextWord(){

currentWord=randomWord();
displayWord(currentWord);

}

function startGame(){

score=0;
time=30;

const timerAudio = document.getElementById("timerSound");
timerAudio.currentTime = 0;
timerAudio.play();

timerDiv.textContent=time;

message.textContent="";
scoreFinal.classList.remove("show");

input.value="";
input.disabled=false;
input.focus();

wordDiv.classList.add("show");

startBtn.style.display="none";

nextWord();

clearInterval(timer);

timer=setInterval(()=>{

time--;
timerDiv.textContent=time;

if(time<=0) endGameTime();

},1000);

}

function endGameWrong(){

clearInterval(timer);
input.disabled=true;

document.getElementById("timerSound").pause();

const wrong = document.getElementById("wrongSound");
wrong.currentTime = 0;
wrong.play();

message.textContent="❌ Oops, Palabra errónea";

showScore();

}

function endGameTime(){

clearInterval(timer);
input.disabled=true;

document.getElementById("timerSound").pause();

const victory = document.getElementById("victorySound");
victory.currentTime = 0;
victory.play();

message.textContent="⏰ TIEMPO TERMINADO";

launchConfetti();

showScore();

}

function showScore(){

scoreFinal.textContent="Puntaje: "+score;
scoreFinal.classList.add("show");

startBtn.style.display="inline-block";
startBtn.textContent="Jugar otra vez";

}

/* -------- INPUT -------- */

input.addEventListener("input",()=>{

let typed=input.value;
let letters=wordDiv.children;

for(let i=0;i<letters.length;i++){

letters[i].classList.remove("correct","wrong");

if(typed[i]==null) continue;

if(typed[i]===currentWord[i]){

letters[i].classList.add("correct");

}else{

letters[i].classList.add("wrong");
endGameWrong();
return;

}

}

if(typed===currentWord){

score++;

const correct = document.getElementById("correctSound");
correct.currentTime = 0;
correct.play();

input.value="";
nextWord();

}

});

startBtn.onclick=startGame;

/* -------- CONFETTI -------- */

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let pieces=[];

function launchConfetti(){

for(let i=0;i<200;i++){

pieces.push({
x:Math.random()*canvas.width,
y:-20,
size:Math.random()*8+4,
speed:Math.random()*3+2,
color:`hsl(${Math.random()*360},100%,60%)`
});

}

}

function updateConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let p of pieces){

p.y+=p.speed;

ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,p.size,p.size);

}

requestAnimationFrame(updateConfetti);

}

updateConfetti();
